# ── KataGo 默认配置 (Tmaster) ─────────────────────────────
# 棋力由 maxVisits 控制，数值越大越强、越慢。

# 日志
logDir = ""
logToStderr = true
logAllGTPCommunication = false

# 计算资源
numAnalysisThreads = 4
numSearchThreadsPerAnalysisThread = 1

# 规则 (中国规则)
rules = chinese
koRule = SIMPLE
scoringRule = AREA
taxRule = NONE
multiStoneSuicideLegal = false
hasButton = false
whiteHandicapBonus = 0

# 棋盘
maxBoardSize = 19

# 搜索限制 (0 = 不限制)
maxVisits = 500
maxPlayouts = 0
maxTime = 10.0

# 分析参数
analysisPVLen = 15
reportAnalysisWinratesAs = BLACK

# GPU / 后端
# Android 用 Eigen (CPU)，不依赖 OpenCL
nnMaxBatchSize = 8
nnRandSeed = 0

# 内存
# 手机内存有限，限制搜索树大小
searchFactorAfterOnePass = 0.5
searchFactorAfterTwoPass = 0.25
