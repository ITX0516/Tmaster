name: Fetch KataGo Sources

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/build_katago_android.sh'
      - '.github/workflows/build_katago.yml'

jobs:
  fetch:
    name: Clone KataGo source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch KataGo sources
        run: |
          chmod +x scripts/build_katago_android.sh
          ./scripts/build_katago_android.sh

      - name: Upload KataGo sources
        uses: actions/upload-artifact@v4
        with:
          name: katago-sources
          path: app/src/main/cpp/katago/cpp/
          retention-days: 90
