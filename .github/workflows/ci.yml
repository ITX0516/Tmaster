name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Eigen3
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libeigen3-dev

      - name: Fetch KataGo sources
        run: |
          chmod +x scripts/build_katago_android.sh
          ./scripts/build_katago_android.sh

      - name: Download model weights
        run: |
          chmod +x scripts/bundle_model.sh
          ./scripts/bundle_model.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tmaster-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Eigen3
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libeigen3-dev

      - name: Fetch KataGo sources
        run: chmod +x scripts/build_katago_android.sh && ./scripts/build_katago_android.sh

      - name: Download model weights
        run: chmod +x scripts/bundle_model.sh && ./scripts/bundle_model.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Release APK
        run: gradle assembleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
