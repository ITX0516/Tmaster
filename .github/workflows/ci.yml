name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  analyze:
    name: Dart Analyze & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - packages/go_board
          - packages/sgf_parser
          - packages/analysis_core
          - packages/llm_agent

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Resolve dependencies
        working-directory: ${{ matrix.package }}
        run: dart pub get

      - name: Static analysis
        working-directory: ${{ matrix.package }}
        run: dart analyze

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: dart test

